<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FridgeSense Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .dashboardLayout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }

    .fullWidth {
      grid-column: 1 / -1;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .topActionBtn {
      min-width: 110px;
      height: 40px;
      font-size: 20px;
      line-height: 1;
    }

    .tableWrap {
      margin-top: 0;
    }

    [data-clickable="true"] {
      cursor: pointer;
    }

    .detailsImage {
      width: 100%;
      max-width: 260px;
      border-radius: 12px;
      display: block;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      background: #0b1220;
    }

    .detailsTitle {
      margin: 4px 0 8px;
      font-size: 20px;
      font-weight: 800;
    }

    .detailsMeta {
      margin: 4px 0;
      color: var(--muted);
    }

    .nutritionGrid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .nutritionItem {
      background: #0b1220;
      border: 1px solid #2a3a66;
      border-radius: 12px;
      padding: 10px;
    }

    .nutritionLabel {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .nutritionValue {
      font-size: 16px;
      font-weight: 700;
    }

    .formGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .formGrid .full {
      grid-column: 1 / -1;
    }

    #emptyState {
      display: none;
      text-align: center;
      padding: 16px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    @media (max-width: 950px) {
      .dashboardLayout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body class="theme-dark">
  <header class="topbar">
    <div class="wrap topbarRow">
      <div>
        <h1>FridgeSense Dashboard</h1>
        <div class="pill">Inventory and nutrition management</div>
      </div>
      <div class="actions">
        <button class="btn ghost topActionBtn" onclick="refreshInventory()">Refresh</button>
        <a class="btn ghost topActionBtn" href="/logout">Logout</a>
      </div>
    </div>
  </header>

  <main class="wrap dashboardLayout">
    <section class="card">
      <div class="cardHead">
        <div class="cardTitle">Inventory</div>
      </div>
      <div class="cardBody cardBodyTight">
        <div class="toolbar">
          <input class="input" type="text" id="searchInput" placeholder="Search foods..." oninput="renderInventory()" />
        </div>

        <div id="inventoryTableWrap" class="tableWrap">
          <table id="inventoryTable">
            <thead>
              <tr>
                <th>Food</th>
                <th>Brand</th>
                <th>Barcode</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inventoryBody"></tbody>
          </table>
        </div>

        <div id="emptyState">No foods found.</div>
      </div>
    </section>

    <section class="card">
      <div class="cardHead">
        <div class="cardTitle">Food Details</div>
      </div>
      <div class="cardBody">
        <div id="detailsContent">
          <p class="muted">Select a food item to view details.</p>
        </div>
      </div>
    </section>

    <section class="card fullWidth">
      <div class="cardHead">
        <div class="cardTitle">Add Food</div>
      </div>
      <div class="cardBody">
        <form id="addFoodForm">
          <div class="formGrid">
            <input class="input" type="text" id="barcode" placeholder="Barcode" required />
            <input class="input" type="text" id="name" placeholder="Food name" required />
            <input class="input" type="text" id="brand" placeholder="Brand" />
            <input class="input" type="text" id="size" placeholder="Size" />
            <input class="input full" type="url" id="image" placeholder="Image URL" />
            <input class="input" type="number" step="any" id="calories" placeholder="Calories" />
            <input class="input" type="number" step="any" id="protein" placeholder="Protein (g)" />
            <input class="input" type="number" step="any" id="carbs" placeholder="Carbs (g)" />
            <input class="input" type="number" step="any" id="fat" placeholder="Fat (g)" />
            <input class="input" type="number" step="any" id="sugar" placeholder="Sugar (g)" />
            <input class="input" type="number" step="any" id="sodium" placeholder="Sodium (mg)" />
            <button type="submit" class="btn full">Add Food</button>
          </div>
        </form>
        <p class="muted" id="formMessage"></p>
      </div>
    </section>
  </main>

  <script>
    let inventory = [];
    let selectedItem = null;

    async function refreshInventory() {
      try {
        const response = await fetch('/api/inventory.json');
        if (!response.ok) throw new Error('Failed to load inventory');
        const data = await response.json();

        inventory = Array.isArray(data.inventory) ? data.inventory : [];
        renderInventory();

        if (selectedItem) {
          const updated = inventory.find(item =>
            String(item.barcode || '') === String(selectedItem.barcode || '')
          );
          if (updated) {
            showDetails(updated);
          } else {
            selectedItem = null;
            document.getElementById('detailsContent').innerHTML =
              '<p class="muted">Select a food item to view details.</p>';
          }
        }
      } catch (err) {
        console.error(err);
        document.getElementById('inventoryBody').innerHTML = '';
        document.getElementById('emptyState').style.display = 'block';
      }
    }

    function renderInventory() {
      const body = document.getElementById('inventoryBody');
      const emptyState = document.getElementById('emptyState');
      const search = document.getElementById('searchInput').value.toLowerCase().trim();

      body.innerHTML = '';

      const filtered = inventory.filter(item => {
        const name = String(item.name || item.product_name || '').toLowerCase();
        const brand = String(item.brand || item.brands || '').toLowerCase();
        const barcode = String(item.barcode || item.code || '').toLowerCase();
        return name.includes(search) || brand.includes(search) || barcode.includes(search);
      });

      if (filtered.length === 0) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      filtered.forEach(item => {
        const tr = document.createElement('tr');
        tr.setAttribute('data-clickable', 'true');
        tr.onclick = () => showDetails(item);

        tr.innerHTML = `
          <td>${escapeHtml(item.name || item.product_name || 'Unknown')}</td>
          <td>${escapeHtml(item.brand || item.brands || '-')}</td>
          <td>${escapeHtml(item.barcode || item.code || '-')}</td>
          <td>
            <button class="btn ghost" onclick="event.stopPropagation(); deleteFood('${escapeJs(item.barcode || item.code || '')}')">
              Delete
            </button>
          </td>
        `;

        body.appendChild(tr);
      });
    }

    function showDetails(item) {
      selectedItem = item;

      const image = item.image || item.image_url || '';
      const name = item.name || item.product_name || 'Unknown';
      const brand = item.brand || item.brands || '-';
      const barcode = item.barcode || item.code || '-';
      const size = item.size || item.quantity || '-';

      const calories = getNutritionValue(item, ['calories', 'energy_kcal', 'energy-kcal_100g', 'energy-kcal']);
      const protein = getNutritionValue(item, ['protein', 'proteins', 'proteins_100g', 'protein_100g']);
      const carbs = getNutritionValue(item, ['carbs', 'carbohydrates', 'carbohydrates_100g', 'carbs_100g']);
      const fat = getNutritionValue(item, ['fat', 'fat_100g']);
      const sugar = getNutritionValue(item, ['sugar', 'sugars', 'sugars_100g', 'sugar_100g']);
      const sodium = getNutritionValue(item, ['sodium', 'sodium_100g', 'salt', 'salt_100g']);

      document.getElementById('detailsContent').innerHTML = `
        <img class="detailsImage" src="${escapeAttr(image || 'https://via.placeholder.com/260x260?text=No+Image')}" alt="Food image"
             onerror="this.src='https://via.placeholder.com/260x260?text=No+Image'">

        <h3 class="detailsTitle">${escapeHtml(name)}</h3>
        <p class="detailsMeta"><strong>Brand:</strong> ${escapeHtml(brand)}</p>
        <p class="detailsMeta"><strong>Barcode:</strong> ${escapeHtml(barcode)}</p>
        <p class="detailsMeta"><strong>Size:</strong> ${escapeHtml(size)}</p>

        <div class="nutritionGrid">
          <div class="nutritionItem"><div class="nutritionLabel">Calories</div><div class="nutritionValue">${escapeHtml(String(calories))}</div></div>
          <div class="nutritionItem"><div class="nutritionLabel">Protein (g)</div><div class="nutritionValue">${escapeHtml(String(protein))}</div></div>
          <div class="nutritionItem"><div class="nutritionLabel">Carbs (g)</div><div class="nutritionValue">${escapeHtml(String(carbs))}</div></div>
          <div class="nutritionItem"><div class="nutritionLabel">Fat (g)</div><div class="nutritionValue">${escapeHtml(String(fat))}</div></div>
          <div class="nutritionItem"><div class="nutritionLabel">Sugar (g)</div><div class="nutritionValue">${escapeHtml(String(sugar))}</div></div>
          <div class="nutritionItem"><div class="nutritionLabel">Sodium (mg)</div><div class="nutritionValue">${escapeHtml(String(sodium))}</div></div>
        </div>
      `;
    }

    async function deleteFood(barcode) {
      if (!barcode) return;
      if (!confirm('Delete this food from inventory?')) return;

      try {
        const response = await fetch(`/api/delete-food`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ barcode })
        });

        if (!response.ok) throw new Error('Delete failed');

        await refreshInventory();
      } catch (err) {
        console.error(err);
        alert('Could not delete item. You still need to add the delete endpoint in Qt.');
      }
    }

    document.getElementById('addFoodForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const payload = {
        barcode: document.getElementById('barcode').value,
        name: document.getElementById('name').value,
        brand: document.getElementById('brand').value,
        size: document.getElementById('size').value,
        image: document.getElementById('image').value,
        calories: document.getElementById('calories').value,
        protein: document.getElementById('protein').value,
        carbs: document.getElementById('carbs').value,
        fat: document.getElementById('fat').value,
        sugar: document.getElementById('sugar').value,
        sodium: document.getElementById('sodium').value
      };

      try {
        const response = await fetch('/api/add-food', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('Add failed');

        document.getElementById('formMessage').textContent = 'Food added successfully.';
        document.getElementById('addFoodForm').reset();
        await refreshInventory();
      } catch (err) {
        console.error(err);
        document.getElementById('formMessage').textContent =
          'Could not add food. You still need to add the add endpoint in Qt.';
      }
    });

    function getNutritionValue(item, keys) {
      const nutriments = item && typeof item.nutriments === 'object' ? item.nutriments : null;

      for (const key of keys) {
        const direct = item?.[key];
        if (direct !== undefined && direct !== null && direct !== '') return direct;

        if (nutriments && nutriments[key] !== undefined && nutriments[key] !== null && nutriments[key] !== '') {
          return nutriments[key];
        }
      }

      return '-';
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function escapeJs(value) {
      return String(value).replaceAll('\\', '\\\\').replaceAll("'", "\\'");
    }

    refreshInventory();
  </script>
</body>
</html>
